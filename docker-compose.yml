version: '3.8'

services:
  viralmusic:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/YOUR_USERNAME/ViralMusic/ytaudio-backend:main
    container_name: viralmusic-backend
    ports:
      - "6060:6060"
    volumes:
      # Persist downloaded music
      - ./data/library:/home/viralmusic/Music/ViralMusic
      # Optional: Mount OAuth credentials for authenticated features
      - ./data/oauth.json:/app/oauth.json:ro
      # Logs
      - ./data/logs:/app/logs
    environment:
      - HOST=0.0.0.0
      - PORT=6060
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6060/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Watchtower for automatic updates
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300  # Check every 5 minutes
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=true
    command: --interval 300 viralmusic-backend
    restart: unless-stopped
    profiles:
      - auto-update  # Only start with: docker-compose --profile auto-update up -d
