name: YTAudioPlayer
schemes:
  YTAudioPlayer:
    build:
      targets:
        YTAudioPlayer: all
        PeacePlayerWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  YTAudioPlayer:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: YTAudioPlayer
      - path: Sources
    resources:
      - path: YTAudioPlayer/LaunchScreen.storyboard
      - path: YTAudioPlayer/Assets.xcassets
      - path: Sources/YTAudioPlayer.xcdatamodeld
    dependencies:
      - target: PeacePlayerWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytaudioplayer.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4Y85577Z4G
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        INFOPLIST_FILE: YTAudioPlayer/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        UILaunchStoryboardName: LaunchScreen
        CODE_SIGN_ENTITLEMENTS: YTAudioPlayer/YTAudioPlayer.entitlements
    info:
      path: YTAudioPlayer/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
          - airplay
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: com.ytaudioplayer.app
            CFBundleURLSchemes:
              - peaceplayer

  PeacePlayerWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PeacePlayerWidget
      - path: Sources/SharedNowPlayingState.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytaudioplayer.app.widget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4Y85577Z4G
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: PeacePlayerWidget/PeacePlayerWidget.entitlements
    info:
      path: PeacePlayerWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
