name: YTAudioPlayer
targets:
  YTAudioPlayer:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: YTAudioPlayer
    resources:
      - path: YTAudioPlayer/LaunchScreen.storyboard
      - path: YTAudioPlayer/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytaudioplayer.app
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        INFOPLIST_FILE: YTAudioPlayer/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        UILaunchStoryboardName: LaunchScreen
    info:
      path: YTAudioPlayer/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
