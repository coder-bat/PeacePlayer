name: Deploy to Server

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest flake8
          
      - name: Lint with flake8
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: Run tests
        run: |
          cd backend
          pytest || echo "No tests yet"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e
            echo "🚀 Starting deployment..."
            
            # Navigate to app directory
            cd ~/ViralMusic
            
            # Backup current version (for rollback)
            echo "📦 Creating backup..."
            BACKUP_DIR="~/backups/viralmusic-$(date +%Y%m%d-%H%M%S)}"
            mkdir -p ~/backups
            cp -r backend "$BACKUP_DIR" 2>/dev/null || true
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
            
            # Setup/update Python environment
            echo "🐍 Setting up Python environment..."
            cd backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt
            
            # Restart service
            echo "🔄 Restarting service..."
            if command -v systemctl &> /dev/null; then
              sudo systemctl restart viralmusic || sudo systemctl start viralmusic
              sudo systemctl status viralmusic --no-pager
            elif command -v supervisorctl &> /dev/null; then
              sudo supervisorctl restart viralmusic || sudo supervisorctl start viralmusic
              sudo supervisorctl status viralmusic
            else
              # Fallback: kill and restart
              pkill -f "python server.py" || true
              nohup ./venv/bin/python server.py > server.log 2>&1 &
            fi
            
            # Health check
            echo "🏥 Health check..."
            sleep 3
            curl -f http://localhost:6060/ || exit 1
            
            echo "✅ Deployment successful!"
            echo "📊 Server status: $(curl -s http://localhost:6060/ | grep -o '"status":"[^"]*"')"
